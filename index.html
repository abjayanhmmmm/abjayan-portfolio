<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>abjayan.</title>
<link rel="preconnect" href="https://fonts.cdnfonts.com" />
<link rel="stylesheet" href="https://fonts.cdnfonts.com/css/aeonik" />
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --yellow:       #FFD54F;
    --blue:         #0000FF;
    --pastel-red:   #f5b8b8;
    --pastel-green: #7aaa96;
    --cars-green:   #5cb87a;
    --cars-dark:    #0f2318;
    --green-text:   #162b22;
    --font:         'Aeonik', 'Inter', sans-serif;
    --gap:          18px;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--yellow);
    font-family: var(--font);
    user-select: none;
    -webkit-user-select: none;
    transition: background 0.9s cubic-bezier(0.22, 1, 0.36, 1);
  }

  /* ── TOPBAR ── */
  #topbar {
    position: fixed; top: 0; left: 0; right: 0;
    padding: 28px 36px;
    display: flex; justify-content: space-between; align-items: center;
    z-index: 300;
  }
  #menu-btn {
    background: none; border: none; cursor: pointer;
    color: var(--blue); padding: 4px;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s ease, color 0.7s ease;
  }
  #menu-btn:hover { transform: scale(1.12); }
  #menu-btn svg { display: block; }
  #page-num {
    font-size: 11px; color: var(--blue);
    letter-spacing: 0.18em; font-variant-numeric: tabular-nums;
    transition: color 0.7s ease;
  }

  /* ── SIDEBAR ── */
  #sidebar {
    position: fixed; left: 0; top: 0;
    width: 294px; height: 100%;
    background: #e85252;
    padding: 90px 40px 52px;
    transform: translateX(-100%);
    transition: transform 0.62s cubic-bezier(0.77, 0, 0.175, 1);
    z-index: 200;
    display: flex; flex-direction: column; gap: 46px;
    overflow-y: auto; scrollbar-width: none;
  }
  #sidebar::-webkit-scrollbar { display: none; }
  #sidebar.open { transform: translateX(0); }
  .nav-section { display: flex; flex-direction: column; gap: 11px; }
  .nav-cat {
    font-size: 9px; color: rgba(255,213,79,0.5);
    letter-spacing: 0.32em; text-transform: uppercase;
    padding-bottom: 10px; border-bottom: 1px solid rgba(255,213,79,0.18);
    margin-bottom: 2px; display: block;
  }
  .nav-link {
    font-size: 25px; font-weight: 700; color: var(--yellow);
    cursor: pointer; text-transform: lowercase; display: block;
    letter-spacing: -0.01em; transition: opacity 0.18s; text-decoration: none;
  }
  .nav-link:hover { opacity: 0.42 !important; }
  .nav-link.active { text-decoration: underline; text-underline-offset: 5px; }

  /* ── STAGE ── */
  #stage { position: absolute; inset: 0; pointer-events: none; }
  #stage.scroll-mode {
    overflow-y: auto;
    overflow-x: hidden;
    pointer-events: all;
    scrollbar-width: none;
  }
  #stage.scroll-mode::-webkit-scrollbar { display: none; }

  /* ── ANIMATIONS ── */
  @keyframes fadeUpIn {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideOut {
    to { transform: translateX(-130%) rotate(-12deg); opacity: 0; }
  }
  @keyframes panelIn {
    from { opacity: 0; transform: translateX(-22px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes lbFadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes lbImgIn {
    from { opacity: 0; transform: scale(0.88); }
    to   { opacity: 1; transform: scale(1); }
  }
  @keyframes masonryIn {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── HOME LETTERS ── */
  .letter {
    font-size: clamp(42px, 8vw, 92px);
    font-weight: 800; color: var(--blue);
    letter-spacing: -0.04em; display: inline-block;
    text-transform: lowercase;
    transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
    will-change: transform; cursor: pointer;
  }
  .letter:hover { transform: scale(1.35); }

  /* ── ABOUT PAGE ── */
  #about-header {
    position: absolute; top: 90px; left: 110px;
    z-index: 20; pointer-events: all;
    animation: fadeUpIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  .letter-small {
    font-size: clamp(22px, 2.5vw, 32px); font-weight: 800;
    color: var(--blue); display: inline-block; cursor: pointer;
    transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .letter-small:hover { transform: scale(1.3); }
  #about-img-wrap {
    position: absolute; top: 220px; left: 110px;
    width: 32vw; max-width: 440px; z-index: 5;
    animation: fadeUpIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  #about-img-wrap img {
    width: 100%; height: auto;
    transform: rotate(-3deg);
    box-shadow: 0 15px 45px rgba(0,0,0,0.15);
  }
  #about-text-wrap {
    position: absolute; left: 110px; bottom: 65px;
    z-index: 20; pointer-events: all;
    animation: fadeUpIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.1s both;
  }
  .about-line { line-height: 0.9; margin-bottom: 8px; }
  .hover-letter {
    font-size: clamp(42px, 5vw, 78px); font-weight: 800;
    color: var(--blue); letter-spacing: -0.05em; display: inline-block;
    transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1); cursor: pointer;
  }
  .hover-letter.sub { font-size: clamp(26px, 3.2vw, 48px); font-weight: 700; opacity: 0.9; }
  .hover-letter:hover { transform: scale(1.35); }

  /* ── PHOTOGRAPHY SPLIT LAYOUT ── */
  #photo-page {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    pointer-events: all;
  }
  #pick-one {
    flex-shrink: 0;
    text-align: center;
    padding: 30px 0 0;
    font-size: clamp(22px, 2.8vw, 38px);
    font-weight: 800; letter-spacing: -0.02em;
    color: var(--pastel-red);
    animation: fadeUpIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.2s both;
  }
  #panels-row { flex: 1; display: flex; min-height: 0; }
  .photo-panel {
    flex: 1; display: flex; flex-direction: column;
    padding: 24px 52px 52px; min-width: 0; overflow: hidden;
  }
  .panel-img-box { flex: 1; min-height: 0; overflow: hidden; }
  .panel-img-box img { width: 100%; height: 100%; object-fit: cover; object-position: center; display: block; }
  .panel-img-box.left-anim { animation: panelIn 1s cubic-bezier(0.22, 1, 0.36, 1) 0.1s both; }
  .panel-text { flex-shrink: 0; padding-top: 20px; line-height: 0.88; }
  .panel-text-anim { animation: fadeUpIn 0.85s cubic-bezier(0.22, 1, 0.36, 1) 0.35s both; }
  .photo-letter {
    font-size: clamp(22px, 3vw, 50px); font-weight: 800;
    color: var(--green-text); letter-spacing: -0.04em;
    display: inline-block; cursor: default;
    transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .photo-letter:hover { transform: scale(1.3); }
  .panel-text.is-link .photo-letter { cursor: pointer; }
  .panel-text.is-link:hover .photo-letter { opacity: 0.62; }
  .panel-divider { flex: 0 0 1px; background: rgba(22,43,34,0.20); margin: 24px 0 52px; align-self: stretch; }
  .right-panel {
    opacity: 0; transform: translateX(32px);
    transition: opacity 1.2s cubic-bezier(0.22, 1, 0.36, 1), transform 1.2s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .right-panel.visible { opacity: 1; transform: translateX(0); }

  /* ── PORTRAITS GRID PAGE ── */
  #portraits-page {
    min-height: 100%;
    padding: 88px 48px 100px;
    pointer-events: all;
  }

  #portraits-header {
    display: flex;
    align-items: baseline;
    gap: 18px;
    margin-bottom: 44px;
    animation: fadeUpIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  .portraits-title-letter {
    font-size: clamp(38px, 5.5vw, 72px);
    font-weight: 800;
    color: var(--blue);
    letter-spacing: -0.04em;
    display: inline-block;
    text-transform: lowercase;
    transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
    cursor: default;
  }
  .portraits-title-letter:hover { transform: scale(1.3); }

  .portraits-count {
    font-size: 12px;
    color: var(--blue);
    letter-spacing: 0.22em;
    opacity: 0.45;
    text-transform: uppercase;
    align-self: flex-end;
    padding-bottom: 8px;
  }

  /* masonry via CSS columns */
  #masonry {
    column-count: 3;
    column-gap: var(--gap);
  }

  .masonry-item {
    break-inside: avoid;
    margin-bottom: var(--gap);
    overflow: hidden;
    cursor: pointer;
    position: relative;
    opacity: 0;
    animation: masonryIn 0.65s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  .masonry-item img {
    width: 100%;
    height: auto;
    display: block;
    transition: transform 0.55s cubic-bezier(0.22, 1, 0.36, 1),
                filter 0.45s ease;
    will-change: transform;
  }
  .masonry-item:hover img {
    transform: scale(1.04);
    filter: brightness(0.86);
  }

  /* ── CARS GRID PAGE ── */
  #cars-page {
    min-height: 100%;
    padding: 88px 48px 100px;
    pointer-events: all;
  }
  #cars-header {
    display: flex;
    align-items: baseline;
    gap: 18px;
    margin-bottom: 44px;
    animation: fadeUpIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  .cars-title-letter {
    font-size: clamp(38px, 5.5vw, 72px);
    font-weight: 800;
    color: var(--cars-dark);
    letter-spacing: -0.04em;
    display: inline-block;
    text-transform: lowercase;
    transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
    cursor: default;
  }
  .cars-title-letter:hover { transform: scale(1.3); }
  .cars-count {
    font-size: 12px;
    color: var(--cars-dark);
    letter-spacing: 0.22em;
    opacity: 0.45;
    text-transform: uppercase;
    align-self: flex-end;
    padding-bottom: 8px;
  }
  #cars-masonry {
    column-count: 3;
    column-gap: var(--gap);
  }
  .cars-item {
    break-inside: avoid;
    margin-bottom: var(--gap);
    overflow: hidden;
    cursor: pointer;
    position: relative;
    opacity: 0;
    animation: masonryIn 0.65s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  .cars-item img {
    width: 100%;
    height: auto;
    display: block;
    transition: transform 0.55s cubic-bezier(0.22, 1, 0.36, 1),
                filter 0.45s ease;
    will-change: transform;
  }
  .cars-item:hover img {
    transform: scale(1.04);
    filter: brightness(0.86);
  }

  /* ── LIGHTBOX ── */
  #lightbox {
    display: none;
    position: fixed; inset: 0;
    z-index: 9000;
    background: rgba(8,8,8,0.94);
    cursor: zoom-out;
    align-items: center;
    justify-content: center;
  }
  #lightbox.active {
    display: flex;
    animation: lbFadeIn 0.28s ease both;
  }

  #lb-img-wrap {
    position: relative;
    max-width: 88vw;
    max-height: 88vh;
    cursor: default;
    animation: lbImgIn 0.36s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  #lb-img-wrap img {
    display: block;
    max-width: 88vw;
    max-height: 88vh;
    width: auto;
    height: auto;
    object-fit: contain;
    box-shadow: 0 36px 100px rgba(0,0,0,0.7);
  }

  #lb-close {
    position: fixed; top: 28px; right: 36px;
    width: 44px; height: 44px;
    background: none; border: none;
    color: rgba(255,255,255,0.75); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.18s, transform 0.18s;
    z-index: 9100;
  }
  #lb-close:hover { color: #fff; transform: scale(1.12) rotate(90deg); }

  #lb-prev, #lb-next {
    position: fixed; top: 50%; transform: translateY(-50%);
    background: none; border: none;
    color: rgba(255,255,255,0.55); cursor: pointer;
    transition: color 0.18s, transform 0.18s;
    z-index: 9100; padding: 14px;
  }
  #lb-prev { left: 28px; }
  #lb-next { right: 28px; }
  #lb-prev:hover { color: #fff; transform: translateY(-50%) translateX(-3px); }
  #lb-next:hover { color: #fff; transform: translateY(-50%) translateX(3px); }

  #lb-counter {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    font-size: 10px; letter-spacing: 0.34em; color: rgba(255,255,255,0.38);
    text-transform: uppercase; z-index: 9100;
  }

  /* ── FOOTER ── */
  #footer {
    position: fixed; bottom: 28px; left: 0; right: 0;
    padding: 0 36px; display: flex; justify-content: space-between;
    z-index: 100; pointer-events: none;
  }
  #footer span {
    font-size: 9px; color: var(--blue);
    letter-spacing: 0.38em; text-transform: uppercase; opacity: 0.30;
    transition: color 0.7s ease;
  }
</style>
</head>

         viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"

<script>
let currentPage = 'home';
let sidebarOpen = false;

/* ── KEYBOARD CLICK ── */
function playKeyClick() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const sr  = ctx.sampleRate;
    const len = Math.floor(sr * 0.065);
    const buf = ctx.createBuffer(1, len, sr);
    const d   = buf.getChannelData(0);
    for (let i = 0; i < len; i++)
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 3.5) * 0.8;
    const src  = ctx.createBufferSource(); src.buffer = buf;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(1.1, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.065);
    src.connect(gain); gain.connect(ctx.destination); src.start();
  } catch(_) {}
}

const stage      = document.getElementById('stage');
const body       = document.getElementById('body');
const sidebar    = document.getElementById('sidebar');
const pageNum    = document.getElementById('page-num');
const footerPage = document.getElementById('footer-page');
const menuBtn    = document.getElementById('menu-btn');
const footer     = document.getElementById('footer');

/* ── SIDEBAR ── */
function toggleSidebar(force) {
  sidebarOpen = force !== undefined ? force : !sidebarOpen;
  sidebar.classList.toggle('open', sidebarOpen);
  document.getElementById('icon-menu').style.display  = sidebarOpen ? 'none'  : 'block';
  document.getElementById('icon-close').style.display = sidebarOpen ? 'block' : 'none';
}

/* ── LETTER BUILDER (keyboard sounds on hover) ── */
function makeLetters(text, cls, onClick) {
  const frag = document.createDocumentFragment();
  [...text].forEach(ch => {
    const s = document.createElement('span');
    s.className = cls;
    s.innerHTML = ch === ' ' ? '&nbsp;' : ch;
    s.addEventListener('mouseenter', () => playKeyClick());
    if (onClick) s.addEventListener('click', e => { e.stopPropagation(); onClick(); });
    frag.appendChild(s);
  });
  return frag;
}

/* ── SLIDE-OUT → PHOTOGRAPHY ── */
function triggerSlideOut() {
  playKeyClick();
  stage.querySelectorAll('.content-node').forEach(n => {
    n.style.animation = 'slideOut 0.8s forwards ease-in';
  });
  setTimeout(() => {
    stage.innerHTML = '';
    body.style.background = 'var(--pastel-green)';
    menuBtn.style.color   = 'var(--green-text)';
    pageNum.style.color   = 'var(--green-text)';
    footer.querySelectorAll('span').forEach(s => s.style.color = 'var(--green-text)');
    pageNum.textContent    = '02';
    footerPage.textContent = 'work';
    renderPhotography();
  }, 820);
}

/* ── PHOTOGRAPHY SPLIT ── */
function renderPhotography() {
  stage.classList.remove('scroll-mode');
  const page = document.createElement('div');
  page.id = 'photo-page'; page.className = 'content-node';

  const pickOne = document.createElement('div');
  pickOne.id = 'pick-one'; pickOne.textContent = 'Pick One.';
  page.appendChild(pickOne);

  const panelsRow = document.createElement('div');
  panelsRow.id = 'panels-row';

  // LEFT — portraits
  const leftPanel = document.createElement('div');
  leftPanel.className = 'photo-panel';
  const leftImgBox = document.createElement('div');
  leftImgBox.className = 'panel-img-box left-anim';
  const pImg = new Image(); pImg.alt = 'portraits';
  pImg.src = 'https://i.postimg.cc/cJRSh90R/18.jpg';
  leftImgBox.appendChild(pImg);
  const leftText = document.createElement('div');
  leftText.className = 'panel-text panel-text-anim is-link';
  leftText.style.cursor = 'pointer';
  leftText.appendChild(makeLetters('i shoot portraits..', 'photo-letter', () => navigate('portraits')));
  leftPanel.appendChild(leftImgBox); leftPanel.appendChild(leftText);

  const divider = document.createElement('div');
  divider.className = 'panel-divider';

  // RIGHT — cars, delayed reveal
  const rightPanel = document.createElement('div');
  rightPanel.className = 'photo-panel right-panel';
  const rightImgBox = document.createElement('div');
  rightImgBox.className = 'panel-img-box';
  const cImg = new Image(); cImg.alt = 'cars';
  cImg.style.objectPosition = 'center 55%';
  cImg.src = 'https://i.postimg.cc/9Mmvpcxc/000001650004.jpg';
  rightImgBox.appendChild(cImg);
  const rightText = document.createElement('div');
  rightText.className = 'panel-text';
  rightText.style.cursor = 'pointer';
  rightText.appendChild(makeLetters('... and cars.', 'photo-letter', () => navigate('cars')));
  rightPanel.appendChild(rightImgBox); rightPanel.appendChild(rightText);

  panelsRow.appendChild(leftPanel);
  panelsRow.appendChild(divider);
  panelsRow.appendChild(rightPanel);
  page.appendChild(panelsRow);
  stage.appendChild(page);

  setTimeout(() => {
    rightPanel.classList.add('visible');
    const letters = rightText.querySelectorAll('.photo-letter');
    letters.forEach((l, i) => setTimeout(() => playKeyClick(), i * 44));
  }, 2100);
}

/* ── PORTRAITS DATA ── */
const portraitPhotos = [
  { src: 'https://i.postimg.cc/qqjbvn0L/000002740005.jpg',             alt: 'street scene' },
  { src: 'https://i.postimg.cc/sfwwSYdv/P2360347.jpg',                 alt: 'portrait' },
  { src: 'https://i.postimg.cc/fWBBXcny/P2360375.jpg',                 alt: 'portrait' },
  { src: 'https://i.postimg.cc/qvdhvFbx/000003310031.jpg',             alt: 'film portrait' },
  { src: 'https://i.postimg.cc/HL6tqM0V/000003340016-(1).jpg',         alt: 'portrait film' },
  { src: 'https://i.postimg.cc/Pr1Qt9zn/17.jpg',                       alt: 'portrait 17' },
  { src: 'https://i.postimg.cc/vm2WqsMh/16.jpg',                       alt: 'portrait 16' },
  { src: 'https://i.postimg.cc/7DGMwJL6/20250708-8149-Fujifilm-200-C41-15.jpg', alt: 'fujifilm 200' },
  { src: 'https://i.postimg.cc/7xZ0cfcL/000003320012.jpg',             alt: 'film portrait 2' },

/* ── LIGHTBOX ── */
let lbIndex  = 0;
let lbPhotos = [];
const lightbox  = document.getElementById('lightbox');
const lbImg     = document.getElementById('lb-img');
const lbCounter = document.getElementById('lb-counter');

function openLightbox(photos, idx) {
  lbPhotos = photos;
  lbIndex  = idx;
  lightbox.classList.add('active');
  showLbPhoto();
  playKeyClick();
}
function showLbPhoto() {
  // re-trigger pop animation
  const wrap = document.getElementById('lb-img-wrap');
  wrap.style.animation = 'none';
  void wrap.offsetWidth;
  wrap.style.animation = 'lbImgIn 0.36s cubic-bezier(0.22, 1, 0.36, 1) both';
  lbImg.src = lbPhotos[lbIndex].src;
  lbImg.alt = lbPhotos[lbIndex].alt;
  lbCounter.textContent = `${lbIndex + 1} / ${lbPhotos.length}`;
}
function closeLightbox() {
  lightbox.classList.remove('active');
  playKeyClick();
}
function lbPrev() { lbIndex = (lbIndex - 1 + lbPhotos.length) % lbPhotos.length; showLbPhoto(); playKeyClick(); }
function lbNext() { lbIndex = (lbIndex + 1) % lbPhotos.length; showLbPhoto(); playKeyClick(); }

document.getElementById('lb-close').addEventListener('click', e => { e.stopPropagation(); closeLightbox(); });
document.getElementById('lb-prev').addEventListener('click',  e => { e.stopPropagation(); lbPrev(); });
document.getElementById('lb-next').addEventListener('click',  e => { e.stopPropagation(); lbNext(); });
lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
document.addEventListener('keydown', e => {
  if (!lightbox.classList.contains('active')) return;
  if (e.key === 'Escape')       closeLightbox();
  if (e.key === 'ArrowRight')   lbNext();
  if (e.key === 'ArrowLeft')    lbPrev();
});

/* ── RENDER PORTRAITS PAGE ── */
function renderPortraits() {
  stage.classList.add('scroll-mode');
  body.style.background = 'var(--pastel-red)';
  menuBtn.style.color   = 'var(--blue)';
  pageNum.style.color   = 'var(--blue)';
  footer.querySelectorAll('span').forEach(s => s.style.color = 'var(--blue)');

  const page = document.createElement('div');
  page.id = 'portraits-page'; page.className = 'content-node';

  // header "portraits  10 photos"
  const hdr = document.createElement('div');
  hdr.id = 'portraits-header';
  const titleWrap = document.createElement('span');
  titleWrap.appendChild(makeLetters('portraits', 'portraits-title-letter', null));
  const cnt = document.createElement('span');
  cnt.className = 'portraits-count';
  cnt.textContent = `${portraitPhotos.length} photos`;
  hdr.appendChild(titleWrap);
  hdr.appendChild(cnt);
  page.appendChild(hdr);

  // masonry grid
  const grid = document.createElement('div');
  grid.id = 'masonry';

  portraitPhotos.forEach((photo, i) => {
    const item = document.createElement('div');
    item.className = 'masonry-item';
    item.style.animationDelay = `${0.06 + i * 0.06}s`;

    const img = new Image();
    img.src     = photo.src;
    img.alt     = photo.alt;
    img.loading = 'lazy';

    item.appendChild(img);
    item.addEventListener('click', () => openLightbox(portraitPhotos, i));
    grid.appendChild(item);
  });

  page.appendChild(grid);
  stage.appendChild(page);
}

function renderContent(page) {
  stage.classList.remove('scroll-mode');
  stage.innerHTML = '';
  menuBtn.style.color = 'var(--blue)';
  pageNum.style.color = 'var(--blue)';
  footer.querySelectorAll('span').forEach(s => s.style.color = 'var(--blue)');

  if (page === 'home') {
    body.style.background = 'var(--yellow)';
    const wrap = document.createElement('div');
    wrap.className = 'content-node';
    wrap.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:all;';
    wrap.appendChild(makeLetters('abjayan.', 'letter', () => navigate('about')));
    stage.appendChild(wrap);

  } else if (page === 'about') {
    body.style.background = 'var(--pastel-red)';

    const header = document.createElement('div');
    header.id = 'about-header'; header.className = 'content-node';
    header.appendChild(makeLetters('about', 'letter-small', () => navigate('portraits')));
    header.appendChild(document.createElement('br'));
    header.appendChild(makeLetters('me', 'letter-small', () => navigate('portraits')));
    stage.appendChild(header);

    const imgWrap = document.createElement('div');
    imgWrap.id = 'about-img-wrap'; imgWrap.className = 'content-node';
    imgWrap.innerHTML = `<img src="https://cdn.discordapp.com/attachments/895353443278020648/1504446558274588852/ddd.jpg?ex=6a07048a&is=6a05b30a&hm=5ab4345034f8ed1a986fb7281a7db6d468c4ab598f2a44b1055809a5075df883&" alt="abjayan">`;
    stage.appendChild(imgWrap);

    const textWrap = document.createElement('div');
    textWrap.id = 'about-text-wrap'; textWrap.className = 'content-node';
    const l1 = document.createElement('div'); l1.className = 'about-line';
    l1.appendChild(makeLetters("i'm abjayan", 'hover-letter', triggerSlideOut));
    const l2 = document.createElement('div'); l2.className = 'about-line';
    l2.appendChild(makeLetters("15 years old", 'hover-letter sub', triggerSlideOut));
    textWrap.appendChild(l1); textWrap.appendChild(l2);
    stage.appendChild(textWrap);

  } else if (page === 'portraits') {
    renderPortraits();
  } else if (page === 'cars') {
    renderCars();
  }
}

/* ── NAVIGATE ── */
function navigate(page) {
  playKeyClick();
  currentPage = page;
  // always reset topbar/footer colours to blue
  menuBtn.style.color = 'var(--blue)';
  pageNum.style.color = 'var(--blue)';
  footer.querySelectorAll('span').forEach(s => s.style.color = 'var(--blue)');
  const nums = { home: '00', about: '01', portraits: '02', cars: '03' };
  pageNum.textContent    = nums[page] || '00';
  footerPage.textContent = page;
  document.querySelectorAll('.nav-link').forEach(l =>
    l.classList.toggle('active', l.dataset.page === page));
  toggleSidebar(false);
  renderContent(page);
}

document.querySelectorAll('.nav-link[data-page]').forEach(l =>
  l.addEventListener('click', () => navigate(l.dataset.page)));
document.getElementById('menu-btn').addEventListener('click', () => {
  playKeyClick(); toggleSidebar();
});

renderContent('home');
